<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" style="background-color: #000000; font-family: 'Courier New', Courier, monospace; cursor: crosshair;">
  <defs>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.02"/>
    </pattern>

    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#222222" stroke-width="0.8" />
    </pattern>
  </defs>

  <!-- Hintergrund-Raster -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Kopfzeile -->
  <rect x="0" y="0" width="800" height="28" fill="#050505"/>
  <rect x="20" y="8" width="100" height="14" fill="#00ff9d" />
  <text x="25" y="19" fill="#000000" font-size="10" font-weight="bold">LOGIC.ENGINE</text>
  <text x="500" y="19" fill="#666666" font-size="10" font-weight="bold">DATA.EXTRACTION_ANOMALY.DETECT</text>
  <line x1="0" y1="28" x2="800" y2="28" stroke="#333333" stroke-width="1.5" />
  
  <text x="20" y="48" fill="#888888" font-size="9" font-weight="bold" letter-spacing="0.05em">ECMS_OS // DATA.DISPLAY // SHIP.DIAGNOSTIC // ANOMALY_SCAN_MATRIX</text>
  <text x="745" y="48" fill="#444444" font-size="9" font-weight="bold">SC007</text>

  <!-- Sidebar Links -->
  <g transform="translate(15, 75)" fill="#ffffff" font-size="10" font-weight="bold">
    <rect x="0" y="0" width="5" height="5" fill="#00ff9d" />
    <text x="12" y="6">MDIR</text>
    <rect x="-5" y="-3" width="45" height="13" fill="none" stroke="#333333" stroke-width="1.5" />
    <rect x="0" y="25" width="5" height="5" fill="#00aaff" />
    <text x="12" y="31">BACK</text>
    <rect x="0" y="60" width="5" height="5" fill="#555555" />
    <text x="12" y="66" fill="#555555">SEL</text>
    <rect x="0" y="110" width="5" height="5" fill="#555555" />
    <text x="12" y="116" fill="#555555">SCAN</text>
  </g>

  <!-- Sidebar Rechts -->
  <g transform="translate(745, 75)" font-size="10" font-weight="bold">
    <rect x="30" y="0" width="5" height="5" fill="#00ff9d" />
    <text x="-5" y="6" fill="#666666">DISP</text>
    <rect x="30" y="25" width="5" height="5" fill="#00aaff" />
    <text x="-5" y="31" fill="#666666">TGT</text>
    <rect x="30" y="75" width="5" height="5" fill="#ffaa00" />
    <text x="-5" y="81" fill="#666666">CYCL</text>
  </g>

  <!-- Keypad -->
  <g transform="translate(100, 260)" font-size="10" font-weight="bold">
    <g>
      <rect x="0" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="12" y="13" fill="#888888">1</text>
      <rect x="40" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="52" y="13" fill="#888888">2</text>
      <rect x="80" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="92" y="13" fill="#888888">3</text>
      <rect x="120" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="132" y="13" fill="#888888">4</text>
      <rect x="160" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="172" y="13" fill="#888888">5</text>
      <rect x="200" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="212" y="13" fill="#888888">6</text>
      <rect x="240" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="252" y="13" fill="#888888">7</text>
      <rect x="280" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="292" y="13" fill="#888888">8</text>
      <rect x="320" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="332" y="13" fill="#888888">9</text>
      <rect x="360" y="0" width="30" height="18" fill="none" stroke="#333333" stroke-width="2" /> <text x="372" y="13" fill="#888888">0</text>
    </g>
    <rect x="420" y="16" width="15" height="3" fill="#ff3333" />
    <rect x="437" y="16" width="4" height="3" fill="#ffaa00" />
    <rect x="443" y="16" width="60" height="3" fill="#00ff9d" />
  </g>

  <!-- Zentraler Schaltplan -->
  <g transform="translate(80, 90) scale(0.55)">
    <!-- Quellen -->
    <g fill="none" stroke="#444444" stroke-width="2.5">
      <rect x="0" y="0" width="65" height="45" /> <text x="10" y="28" fill="#ffffff" font-size="14" font-weight="bold" stroke="none">SRC1</text>
      <rect x="0" y="120" width="65" height="45" /> <text x="10" y="148" fill="#ffffff" font-size="14" font-weight="bold" stroke="none">SRC2</text>
      <rect x="0" y="240" width="65" height="45" /> <text x="10" y="268" fill="#ffffff" font-size="14" font-weight="bold" stroke="none">SRC3</text>
    </g>

    <!-- Einlaufende Pfade -->
    <path d="M 65 22 H 180 V 140 H 280" fill="none" stroke="#333333" stroke-width="3" />
    <path d="M 65 22 H 180 V 140 H 280" fill="none" stroke="#00ff9d" stroke-width="3" stroke-dasharray="10 30">
      <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1s" repeatCount="indefinite" />
    </path>

    <path d="M 65 142 H 280" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="10 30">
      <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1s" repeatCount="indefinite" />
    </path>

    <path d="M 65 262 H 180 V 140 H 280" fill="none" stroke="#333333" stroke-width="3" />
    <path d="M 65 262 H 180 V 140 H 280" fill="none" stroke="#00ff9d" stroke-width="3" stroke-dasharray="10 30">
      <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1s" repeatCount="indefinite" />
    </path>

    <!-- Knotenpunkt -->
    <circle cx="280" cy="140" r="8" fill="#000" stroke="#444444" stroke-width="2.5" />
    <circle cx="280" cy="140" r="3" fill="#00ff9d" />
    
    <!-- Kasten 1 (PROC.MAIN_A) -->
    <g transform="translate(280, 85)">
      <rect x="0" y="0" width="170" height="110" fill="none" stroke="#444444" stroke-width="3" />
      <text x="10" y="20" fill="#666666" font-size="11" font-weight="bold">PROC.MAIN_A</text>
      
      <!-- Anomalie-Warnung (Neu zentriert auf y=40) -->
      <g transform="translate(40, 40)">
        <rect x="0" y="0" width="90" height="50" fill="#ff3333" opacity="0.15">
          <animate attributeName="opacity" values="0.25; 0.05; 0.25" dur="1s" repeatCount="indefinite" />
        </rect>
        <rect x="0" y="0" width="90" height="50" fill="none" stroke="#ff3333" stroke-width="2" stroke-dasharray="3 3" />
        <text x="45" y="32" fill="#ff3333" font-size="12" font-weight="bold" text-anchor="middle">ANMLY.DETC
          <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
        </text>
      </g>

      <!-- Verbindungspfad -->
      <path d="M 170 55 H 230" fill="none" stroke="#333333" stroke-width="3" />
      <path d="M 170 55 H 230" fill="none" stroke="#00ff9d" stroke-width="3" stroke-dasharray="10 10">
        <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.5s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- Kasten 2 (PROC.MAIN_B) -->
    <g transform="translate(515, 85)">
      <rect x="0" y="0" width="150" height="110" fill="none" stroke="#444444" stroke-width="3" />
      <text x="10" y="20" fill="#666666" font-size="11" font-weight="bold">PROC.MAIN_B</text>
      
      <!-- Ausgehende Pfade -->
      <path d="M 150 35 H 250 V -50 H 285" fill="none" stroke="#333333" stroke-width="3" />
      <path d="M 150 35 H 250 V -50 H 285" fill="none" stroke="#00ff9d" stroke-width="3" stroke-dasharray="15 25">
        <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1.2s" repeatCount="indefinite" />
      </path>
      
      <path d="M 150 75 H 250 V 150 H 285" fill="none" stroke="#333333" stroke-width="3" />
      <path d="M 150 75 H 250 V 150 H 285" fill="none" stroke="#ffaa00" stroke-width="3" stroke-dasharray="15 25">
        <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1.2s" repeatCount="indefinite" />
      </path>
    </g>
  </g>

  <!-- Statistik-Panel -->
  <rect x="520" y="70" width="200" height="16" fill="#151515" stroke="#333333" stroke-width="1.5" />
  <text x="525" y="82" fill="#888888" font-size="10" font-weight="bold">LOGIC.EVAL.STATUS</text>

  <g transform="translate(520, 100)" font-size="9" font-weight="bold">
    <text x="0" y="20" fill="#555555">INGST.01</text>
    <text x="65" y="20" fill="#ffffff">420.1 MB</text>
    <text x="135" y="20" fill="#00ff9d">NML</text>
    <text x="0" y="35" fill="#555555">INGST.02</text>
    <text x="135" y="35" fill="#ffaa00">WRN</text>
    <text x="0" y="75" fill="#ff3333">PRC.NODE.2</text>
    <text x="135" y="75" fill="#ff3333">ERR</text>
    <rect x="170" y="68" width="6" height="6" fill="#ff3333">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Console Output Area -->
  <g transform="translate(520, 215)" font-size="9" font-weight="bold">
    <rect x="0" y="-12" width="200" height="75" fill="#050505" stroke="#333333" stroke-width="2" />
    <text x="5" y="2" fill="#00ff9d">> STRM INGESTION...</text>
    <text x="5" y="24" fill="#ffaa00">> PACKET_LOSS: 0.04%</text>
    <text x="5" y="35" fill="#ff3333">> CRIT: ANOMALY FOUND</text>
    <text x="5" y="57" fill="#00ff9d">> AWAITING.CMND<tspan font-weight="bold" fill="#00ff9d"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />_</tspan></text>
  </g>

  <rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none" />
</svg>
