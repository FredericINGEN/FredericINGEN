<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" width="100%">
<defs>
  <style>
    .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    .header-text { font-weight: bold; fill: #00ff9d; }
    .label-text { fill: #666666; font-size: 8px; letter-spacing: 0.08em; }
    .data-text { fill: #e0e0e0; }
    @keyframes scan { 0%{transform:translateY(-4px)} 100%{transform:translateY(324px)} }
    @keyframes p1 { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes p2 { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes p3 { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes p4 { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes f1 { 0%,10%{opacity:0} 20%,100%{opacity:1} }
    @keyframes f2 { 0%,22%{opacity:0} 32%,100%{opacity:1} }
    @keyframes f3 { 0%,34%{opacity:0} 44%,100%{opacity:1} }
    @keyframes f4 { 0%,46%{opacity:0} 56%,100%{opacity:1} }
    @keyframes epochFade { 0%{opacity:0} 10%{opacity:1} 30%{opacity:0} 31%{opacity:1} 60%{opacity:0} 61%{opacity:1} 100%{opacity:1} }
    @keyframes noCloudGlow { 0%,100%{opacity:0.8; filter: drop-shadow(0 0 2px #00ff9d);} 50%{opacity:1; filter: drop-shadow(0 0 5px #00ff9d);} }
  </style>
</defs>

<!-- Hauptrahmen -->
<rect width="860" height="320" fill="#000"/>
<rect width="860" height="320" fill="none" stroke="#222222" stroke-width="1.5"/>

<!-- Animierte Scanline -->
<rect x="0" y="0" width="860" height="2" fill="#00ff9d" opacity="0.02">
  <animateTransform attributeName="transform" type="translate" from="0,-4" to="0,324" dur="6s" repeatCount="indefinite"/>
</rect>

<!-- System Header Bar -->
<rect x="0" y="0" width="860" height="28" fill="#050505"/>
<rect x="0" y="27" width="860" height="1" fill="#222222"/>
<text x="14" y="19" class="mono header-text" font-size="9" letter-spacing="0.1em">SYSTEM_OS / LOCAL_FIRST / AI_SANDBOX</text>
<text x="660" y="19" class="mono" font-size="8" fill="#333333" letter-spacing="0.06em">ARCEN_RESEARCH · GERMANY</text>

<!-- Linkes Panel: Local Models -->
<g class="mono">
<rect x="14" y="42" width="222" height="264" fill="#050505" rx="2" stroke="#1a1a1a" stroke-width="1.2"/>
<text x="24" y="57" class="label-text">LOCAL MODELS</text>

<!-- Leuchtendes NO CLOUD Label -->
<rect x="160" y="46" width="66" height="14" rx="2" fill="#0a1a14" stroke="#00ff9d" stroke-width="1.2" style="animation: noCloudGlow 2s ease-in-out infinite"/>
<text x="193" y="56" font-size="8" fill="#00ff9d" text-anchor="middle" font-weight="bold">NO CLOUD</text>
<rect x="14" y="65" width="222" height="1" fill="#1a1a1a"/>

<!-- Modelle Liste -->
<g transform="translate(0, 5)">
  <rect x="22" y="72" width="6" height="6" rx="1" fill="#00ff9d" style="animation: p1 3s ease-in-out infinite"/>
  <text x="34" y="78" font-size="9" class="data-text" style="animation: f1 8s ease forwards">LLAMA_3.2_3B</text>
  <text x="168" y="78" font-size="8" fill="#888888" style="animation: f1 8s ease forwards">1.9 GB</text>
  <text x="34" y="89" font-size="7" fill="#444444">ON-DEVICE · Q4_K_M · OFFLINE</text>

  <rect x="22" y="105" width="6" height="6" rx="1" fill="#00aaff" style="animation: p2 2.5s 0.5s ease-in-out infinite"/>
  <text x="34" y="111" font-size="9" class="data-text" style="animation: f2 8s ease forwards">MISTRAL_7B</text>
  <text x="168" y="111" font-size="8" fill="#888888" style="animation: f2 8s ease forwards">4.1 GB</text>
  <text x="34" y="122" font-size="7" fill="#444444">ON-DEVICE · Q4_K_M · OFFLINE</text>

  <rect x="22" y="138" width="6" height="6" rx="1" fill="#aa77ff" style="animation: p3 2s 1s ease-in-out infinite"/>
  <text x="34" y="144" font-size="9" class="data-text" style="animation: f3 8s ease forwards">KIMI_K2</text>
  <text x="168" y="144" font-size="8" fill="#aa77ff" style="animation: f3 8s ease forwards">API</text>
  <text x="34" y="155" font-size="7" fill="#444444">MOONSHOT · FINE-TUNABLE · MCP</text>

  <rect x="22" y="171" width="6" height="6" rx="1" fill="#ffaa00" style="animation: p4 3.5s 0.3s ease-in-out infinite"/>
  <text x="34" y="177" font-size="9" class="data-text" style="animation: f4 8s ease forwards">NOMIC_EMBED</text>
  <text x="168" y="177" font-size="8" fill="#888888" style="animation: f4 8s ease forwards">80 MB</text>
  <text x="34" y="188" font-size="7" fill="#444444">ON-DEVICE · Q8_0 · VECTOR</text>
</g>

<rect x="14" y="205" width="222" height="1" fill="#1a1a1a"/>
<g transform="translate(0, 10)">
  <text x="24" y="212" font-size="8" fill="#a0a0a0">BACKEND: OLLAMA · 11434</text>
  <text x="24" y="224" font-size="8" fill="#a0a0a0">MEMORY : SQLITE_VEC · ONLINE</text>
  <text x="24" y="236" font-size="8" fill="#a0a0a0">SYNC   : UPSTREAM · 06:00 UTC</text>
  <text x="24" y="248" font-size="8" fill="#a0a0a0">PWA    : OFFLINE · READY</text>
</g>
<rect x="14" y="265" width="222" height="1" fill="#1a1a1a"/>
<text x="24" y="278" font-size="7" fill="#444444">DATA NEVER LEAVES YOUR DEVICE</text>
<text x="24" y="290" font-size="7" fill="#333333">NO TELEMETRY · NO TRACKING</text>
</g>

<!-- Mittleres Panel: Fine-Tune -->
<g class="mono">
<rect x="250" y="42" width="310" height="264" fill="#030303" rx="2" stroke="#1a1a1a" stroke-width="1.2"/>
<text x="260" y="57" class="label-text">FINE-TUNE ON YOUR DATA</text>
<rect x="250" y="65" width="310" height="1" fill="#1a1a1a"/>

<g transform="translate(0, 10)">
  <rect x="260" y="70" width="3" height="30" rx="1" fill="#ffaa00" opacity="0.6"/>
  <text x="272" y="80" font-size="8" fill="#ffaa00" font-weight="bold">01 · PREPARE</text>
  <text x="272" y="92" font-size="8" class="data-text">YOUR_DATA.jsonl → OCEL format</text>

  <rect x="260" y="120" width="3" height="30" rx="1" fill="#00aaff" opacity="0.6"/>
  <text x="272" y="130" font-size="8" fill="#00aaff" font-weight="bold">02 · TOKENIZE</text>
  <text x="272" y="142" font-size="8" class="data-text">LlamaFactory · local GPU / CPU</text>

  <rect x="260" y="170" width="3" height="44" rx="1" fill="#aa77ff" opacity="0.6"/>
  <text x="272" y="180" font-size="8" fill="#aa77ff" font-weight="bold">03 · TRAIN</text>
  <text x="272" y="192" font-size="8" class="data-text">KIMI_K2 · LoRA · your corpus</text>
  
  <rect x="272" y="198" width="90" height="2" rx="1" fill="#111"/>
  <rect x="272" y="198" width="0" height="2" rx="1" fill="#aa77ff">
    <animate attributeName="width" values="0;90;0;90;0;65" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="368" y="202" font-size="8" fill="#ffffff" style="animation: epochFade 8s ease-in-out infinite">EPOCH 3/5</text>
  <text x="272" y="212" font-size="7" fill="#444444">KTRANSFORMERS · LOCAL HARDWARE</text>

  <rect x="260" y="234" width="3" height="30" rx="1" fill="#00ff9d" opacity="0.6"/>
  <text x="272" y="244" font-size="8" fill="#00ff9d" font-weight="bold">04 · DEPLOY</text>
  <text x="272" y="256" font-size="8" class="data-text">GGUF export → Ollama → sandbox</text>
</g>
</g>

<!-- Rechtes Panel: Runtime Stats -->
<g class="mono">
<rect x="574" y="42" width="272" height="264" fill="#050505" rx="2" stroke="#1a1a1a" stroke-width="1.2"/>
<text x="584" y="57" class="label-text">RUNTIME STATS</text>
<rect x="574" y="65" width="272" height="1" fill="#1a1a1a"/>

<g transform="translate(0, 15)">
  <text x="584" y="78" font-size="8" fill="#888888">INFERENCE · TOK/S</text>
  <text x="584" y="94" font-size="8" fill="#444444">LLAMA_3B</text>
  <rect x="655" y="89" width="100" height="3" rx="1.5" fill="#111"/>
  <rect x="655" y="89" width="0" height="3" rx="1.5" fill="#00ff9d">
    <animate attributeName="width" from="0" to="80" dur="3s" fill="freeze"/>
  </rect>
  <text x="765" y="93" font-size="9" class="data-text">42</text>

  <text x="584" y="110" font-size="8" fill="#444444">MISTRAL_7B</text>
  <rect x="655" y="105" width="100" height="3" rx="1.5" fill="#111"/>
  <rect x="655" y="105" width="0" height="3" rx="1.5" fill="#00aaff">
    <animate attributeName="width" from="0" to="32" dur="3.5s" fill="freeze"/>
  </rect>
  <text x="765" y="109" font-size="9" class="data-text">18</text>

  <rect x="574" y="125" width="272" height="1" fill="#1a1a1a"/>
  
  <text x="584" y="145" font-size="9" fill="#888888">ON-DEVICE MEMORY</text>
  <text x="584" y="162" font-size="12" class="data-text">2,847 <tspan font-size="8" fill="#444444" dx="5">embeddings stored</tspan></text>
  <text x="584" y="180" font-size="12" class="data-text">5 <tspan font-size="8" fill="#444444" dx="5">retrieved per query</tspan></text>

  <rect x="574" y="195" width="272" height="1" fill="#1a1a1a"/>
  <text x="584" y="212" font-size="8" fill="#888888">FINE-TUNE STATUS</text>
  <text x="584" y="228" font-size="8" class="data-text">KIMI_K2 · LoRA · EPOCH 3/5</text>
  <text x="584" y="242" font-size="8" fill="#00ff9d">LLAMA_3B · LoRA · COMPLETE</text>
</g>
</g>

<!-- Footer -->
<rect x="0" y="305" width="860" height="1" fill="#1a1a1a"/>
<text x="14" y="316" class="mono" font-size="7" fill="#333333">YOUR DATA · YOUR MODEL · YOUR HARDWARE · LOCAL FIRST · OPEN SOURCE · ARCEN_RESEARCH</text>
</svg>
