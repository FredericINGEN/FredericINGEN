<svg width="1200" height="180" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Clipping-Masken: Neu berechnet für Schriftgröße 56px und 1200px Breite -->
    <!-- Zeile 1: Breite ca. 1075px -> Start bei 600 - 537 = 63 -->
    <clipPath id="t1">
      <rect x="63" y="0" width="0" height="180">
        <animate attributeName="width" values="0; 1075; 1075; 0" keyTimes="0; 0.083; 0.333; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <!-- Zeile 2: Breite ca. 975px -> Start bei 600 - 487 = 113 -->
    <clipPath id="t2">
      <rect x="113" y="0" width="0" height="180">
        <animate attributeName="width" values="0; 0; 975; 975; 0" keyTimes="0; 0.333; 0.416; 0.666; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <!-- Zeile 3: Breite ca. 805px -> Start bei 600 - 402 = 198 -->
    <clipPath id="t3">
      <rect x="198" y="0" width="0" height="180">
        <animate attributeName="width" values="0; 0; 805; 805; 0" keyTimes="0; 0.666; 0.749; 0.999; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <!-- Gemeinsame Einstellungen: Schriftgröße 56, Text-Anchor Middle bei x=600 -->
  <g font-family="monospace" font-weight="bold" font-size="56" fill="#00ff9d" text-anchor="middle">

    <!-- Zeile 1: Building Industrial Intelligence -->
    <g opacity="0">
      <animate attributeName="opacity" values="1; 1; 0; 0" keyTimes="0; 0.332; 0.333; 1" dur="12s" repeatCount="indefinite" />
      
      <!-- Pfeil: Links vom Textblock platziert -->
      <text x="30" y="90" dy=".35em" text-anchor="start">&gt;</text>
      
      <text x="600" y="90" dy=".35em" opacity="0.4" clip-path="url(#t1)">Building Industrial Intelligence</text>

      <!-- Cursor: Wandert von x=63 bis x=1138 -->
      <rect y="60" width="26" height="65" fill="#00ff9d">
        <animate attributeName="x" values="63; 1138; 1138; 63" keyTimes="0; 0.083; 0.333; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Zeile 2: Object-Centric Process Mining -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.332; 0.333; 0.665; 0.666; 1" dur="12s" repeatCount="indefinite" />
      
      <text x="80" y="90" dy=".35em" text-anchor="start">&gt;</text>
      
      <text x="600" y="90" dy=".35em" opacity="0.4" clip-path="url(#t2)">Object-Centric Process Mining</text>

      <rect y="60" width="26" height="65" fill="#00ff9d">
        <animate attributeName="x" values="113; 113; 1088; 1088; 113" keyTimes="0; 0.333; 0.416; 0.666; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Zeile 3: Open-Source Independence -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.665; 0.666; 1" dur="12s" repeatCount="indefinite" />
      
      <text x="165" y="90" dy=".35em" text-anchor="start">&gt;</text>
      
      <text x="600" y="90" dy=".35em" opacity="0.4" clip-path="url(#t3)">Open-Source Independence</text>

      <rect y="60" width="26" height="65" fill="#00ff9d">
        <animate attributeName="x" values="198; 198; 1003; 1003; 198" keyTimes="0; 0.666; 0.749; 0.999; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </g>

  </g>
</svg>
